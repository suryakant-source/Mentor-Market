<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expert Dashboard — MentorMarket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    @keyframes barGrow {
      from { height: 0 !important; }
      to { height: var(--bar-height); }
    }
  </style>
</head>
<body>

  <div class="dashboard">
    <aside class="sidebar">
      <div class="sidebar__logo">
        <svg viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="6" fill="#F5A623"/>
          <path d="M9 16L13 20L23 11" stroke="#0A1628" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        MentorMarket
      </div>

      <nav class="sidebar__nav">
        <div class="sidebar__nav-item active" data-tab="overview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          Overview
        </div>
        <div class="sidebar__nav-item" data-tab="schedule">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          My Schedule
        </div>
        <div class="sidebar__nav-item" data-tab="earnings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          Earnings
        </div>
        <div class="sidebar__nav-item" data-tab="profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          My Profile
        </div>
        <div class="sidebar__nav-item" data-tab="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          Settings
        </div>
      </nav>

      <div class="sidebar__user">
        <img src="assets/experts/expert-1.jpg" alt="Sarah" class="sidebar__user-avatar">
        <div class="sidebar__user-info">
          <div class="sidebar__user-name">Sarah</div>
          <a href="login.html" class="sidebar__user-logout">Logout</a>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="main-content__header"></div>
      <div class="main-content__body">
        <div class="tab-content active" id="overview-tab"></div>
        <div class="tab-content" id="schedule-tab"></div>
        <div class="tab-content" id="earnings-tab"></div>
        <div class="tab-content" id="profile-tab"></div>
        <div class="tab-content" id="settings-tab"></div>
      </div>
    </main>

    <div class="mobile-tabs">
      <div class="mobile-tabs__item active" data-tab="overview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
        </svg>
        Overview
      </div>
      <div class="mobile-tabs__item" data-tab="schedule">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Schedule
      </div>
      <div class="mobile-tabs__item" data-tab="earnings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
        Earnings
      </div>
      <div class="mobile-tabs__item" data-tab="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Profile
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>
  <script src="js/expert-dashboard.js"></script>
  <script>
    function animateEarningsBars() {
      const bars = document.querySelectorAll('.earnings-bar');
      const maxEarning = Math.max(...expertData.monthlyEarnings);
      
      bars.forEach((bar, i) => {
        const earning = parseInt(bar.dataset.earning);
        const heightPercent = (earning / maxEarning) * 100;
        bar.style.setProperty('--bar-height', heightPercent + '%');
        bar.style.height = '0';
        
        setTimeout(() => {
          bar.style.animation = `barGrow 600ms var(--ease-spring) forwards`;
        }, 100 + (i * 100));
      });
    }

    const originalInitSidebar = initSidebar;
    initSidebar = function() {
      originalInitSidebar();
      
      document.querySelectorAll('.sidebar__nav-item, .mobile-tabs__item').forEach(item => {
        item.addEventListener('click', () => {
          if (item.dataset.tab === 'earnings') {
            setTimeout(animateEarningsBars, 100);
          }
        });
      });
    };
  </script>
</body>
</html>
