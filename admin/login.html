<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — MentorMarket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    .admin-login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--navy-deep);
      padding: 24px;
    }

    .admin-login-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 48px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .admin-login-card__logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: var(--font-heading);
      font-size: 24px;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: 8px;
    }

    .admin-login-card__logo svg {
      width: 36px;
      height: 36px;
    }

    .admin-login-card__badge {
      background: var(--gold-primary);
      color: var(--navy-deep);
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: var(--radius-sm);
      letter-spacing: 0.05em;
      margin-bottom: 32px;
      display: inline-block;
    }

    .admin-login-card h1 {
      font-family: var(--font-heading);
      font-size: 28px;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: 8px;
    }

    .admin-login-card > p {
      font-size: 15px;
      color: var(--gray-500);
      margin-bottom: 32px;
    }

    .admin-login-card .form-group {
      text-align: left;
    }
  </style>
</head>
<body>

  <div class="admin-login-page">
    <div class="admin-login-card">
      <div class="admin-login-card__logo">
        <svg viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="8" fill="#F5A623"/>
          <path d="M10 18L15 23L26 12" stroke="#0A1628" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        MentorMarket
      </div>
      <span class="admin-login-card__badge">ADMIN</span>
      <h1>Welcome Back</h1>
      <p>Sign in to access the admin panel</p>

      <form id="adminLoginForm">
        <div class="form-group">
          <label>Email Address</label>
          <div class="form-input-wrapper">
            <input type="email" id="adminEmail" class="form-input" placeholder="admin@mentormarket.com">
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="form-input-wrapper">
            <input type="password" id="adminPassword" class="form-input" placeholder="Enter your password">
          </div>
        </div>
        <button type="submit" class="btn btn--primary" style="width: 100%; height: 52px; font-size: 16px;">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
